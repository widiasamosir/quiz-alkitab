<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kuis 2 Raja-raja - GPdI Maranatha</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 700px; width: 100%; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; font-size: 1.5em; }

        .nav-header { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #dee2e6; }
        .selector-container { display: flex; align-items: center; gap: 10px; }
        select { padding: 5px; border-radius: 4px; border: 1px solid #3498db; cursor: pointer; }

        .progress-info { color: #7f8c8d; font-weight: bold; font-size: 0.9em; margin-bottom: 30px; margin-top: 30px; }
        .question { font-size: 1.25em; margin-bottom: 20px; color: #34495e; line-height: 1.5; font-weight: 600; }
        .option { display: block; width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #ecf0f1; border-radius: 10px; cursor: pointer; background: #fff; font-size: 16px; transition: 0.2s; text-align: left; }
        .option:hover:not(.disabled) { background: #f1faff; border-color: #3498db; }
        .wrong { background-color: #ff7675 !important; border-color: #d63031 !important; color: white; }
        .correct { background-color: #55efc4 !important; border-color: #00b894 !important; color: #2d3436; font-weight: bold; }
        .disabled { cursor: default; }

        #hint-btn { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        #hint-text { display: none; margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 4px solid #f39c12; color: #e65100; font-size: 0.9em; border-radius: 4px; }

        #info-box { display: none; margin-top: 20px; padding: 15px; background: #e1f5fe; border-left: 5px solid #03a9f4; border-radius: 5px; color: #01579b; font-style: italic; animation: fadeIn 0.5s; }

        /* PIN Section Styles */
        #pin-container { display: none; margin-top: 20px; padding: 15px; border: 2px dashed #3498db; border-radius: 10px; text-align: center; background: #f0f7ff; }
        #pin-input { padding: 10px; width: 100px; font-size: 18px; text-align: center; border: 2px solid #3498db; border-radius: 5px; margin-bottom: 10px; }
        #pin-btn { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #next-btn { display: none; margin-top: 20px; width: 100%; padding: 15px; background: #2980b9; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; }

        #result { display: none; text-align: center; padding: 40px 10px; }
        .blessing { font-size: 24px; color: #2c3e50; margin-bottom: 20px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-content">
        <div class="nav-header">
            <div class="selector-container">
                <label for="q-select" style="font-size: 0.8em; font-weight: bold; color: #34495e;">PILIH SOAL:</label>
                <select id="q-select" onchange="jumpToQuestion(this.value)"></select>
            </div>
            <button id="hint-btn" onclick="toggleHint()">💡 PETUNJUK</button>
        </div>

        <div id="hint-text"></div>
        <div class="progress-info" id="progress-text"></div>
        <h1 id="title">Komisi Pemuda & Remaja GPdI Maranatha - Bible and Trivia Quiz</h1>
        <div class="question" id="question-text"></div>
        <div id="options-container"></div>

        <div id="info-box"></div>

        <div id="pin-container">
            <p style="margin-top:0; font-weight:bold; color:#2980b9;">Sesi kuis akan segera dimulai!<br>Masukkan PIN untuk lanjut:</p>
            <input type="password" id="pin-input" placeholder="****">
            <br>
            <button id="pin-btn" onclick="verifyPin()">BUKA KUIS</button>
        </div>

        <button id="next-btn" onclick="nextQuestion()">Pertanyaan Selanjutnya →</button>
    </div>

    <div id="result">
        <h1>Sesi Kuis Selesai!</h1>
        <div class="blessing">Tuhan Yesus Memberkati </div>
        <p>Terima kasih telah bible reading. HEHEE.</p>
        <button onclick="location.reload()" style="padding:12px 25px; background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer; margin-top: 20px;">Ulangi Dari Awal</button>
    </div>
</div>

<script>

        { q: "Berapa umur Yoas saat menjadi raja?", options: ["7 tahun", "8 tahun", "12 tahun", "16 tahun"], correct: 0, hint: "Angka di bawah sepuluh.", info: "2 Raja-raja 11:21 - Yoas berumur tujuh tahun waktu ia naik raja." },

        { q: "Siapa raja Yehuda yang kena kusta karena sombong?", options: ["Uzia", "Yotam", "Ahas", "Manasye"], correct: 0, hint: "Juga dikenal sebagai Azarya.", info: "2 Raja-raja 15:5 - Tuhan menulahi raja itu dengan kusta." },
        { q: "Siapa raja Yehuda yang paling saleh dan percaya Tuhan?", options: ["Ahas", "Hizkia", "Manasye", "Amon"], correct: 1, hint: "Berdoa meminta perpanjangan umur.", info: "2 Raja-raja 18:5 - Ia percaya kepada Tuhan, Allah Israel." },
        { q: "Siapa nabi yang mendampingi raja Hizkia?", options: ["Yeremia", "Yesaya", "Mikha", "Zefanya"], correct: 1, hint: "Menulis kitab nabi besar yang sangat panjang.", info: "2 Raja-raja 19:2 - Mereka pergi kepada nabi Yesaya bin Amos." },
        { q: "Berapa tahun tambahan umur Hizkia setelah berdoa?", options: ["5 tahun", "10 tahun", "15 tahun", "20 tahun"], correct: 2, hint: "Satu setengah dekade.", info: "2 Raja-raja 20:6 - Aku akan menambah umurmu lima belas tahun lagi." },

        { q: "Siapa raja yang naik takhta pada usia 8 tahun?", options: ["Yoas", "Yosia", "Manasye", "Zedekia"], correct: 1, hint: "Melakukan reformasi setelah menemukan Taurat.", info: "2 Raja-raja 22:1 - Yosia berumur delapan tahun waktu naik raja." },

        { q: "Siapa rasul yang dikenal sebagai 'Si Peragu' karena ingin melihat bekas paku Yesus?", options: ["Petrus", "Tomas", "Filipus", "Matius"], correct: 1, hint: "Ia berkata: 'Sebelum aku melihat... aku tidak akan percaya.'", info: "Yohanes 20:25 - Tomas tidak percaya sebelum melihat tanda bekas paku." },
        { q: "Apa nama kitab terpendek di dalam Alkitab (berdasarkan jumlah kata asli)?", options: ["Obaja", "Filemon", "2 Yohanes", "3 Yohanes"], correct: 3, hint: "Hanya terdiri dari satu pasal pendek.", info: "3 Yohanes secara teknis memiliki jumlah kata paling sedikit dalam bahasa Yunani asli." },
        { q: "Siapa nabi yang ditelan ikan besar karena melarikan diri dari tugas Tuhan?", options: ["Elia", "Yunus", "Yeremia", "Daniel"], correct: 1, hint: "Ia mencoba pergi ke Tarsis.", info: "Yunus 1:17 - Maka atas penentuan TUHAN datanglah seekor ikan besar yang menelan Yunus." },
        { q: "Siapa yang menulis sebagian besar kitab Mazmur?", options: ["Salomo", "Musa", "Daud", "Asaf"], correct: 2, hint: "Raja yang juga seorang pemain kecapi.", info: "Daud menulis sekitar 73 mazmur dari total 150 mazmur." },
        { q: "Berapa banyak anak laki-laki yang dimiliki Yakub (Bapa leluhur Israel)?", options: ["7", "10", "12", "13"], correct: 2, hint: "Menjadi dasar 12 suku Israel.", info: "Yakub memiliki 12 anak laki-laki dan 1 anak perempuan (Dina)." },
        { q: "Siapa perempuan yang menjadi ratu di Persia dan menyelamatkan bangsanya dari genosida?", options: ["Rut", "Ester", "Hana", "Elisabet"], correct: 1, hint: "Namanya menjadi salah satu nama kitab.", info: "Kitab Ester menceritakan keberanian Ester menghadap raja Ahasyweros." },
        { q: "Apa bahasa asli sebagian besar Perjanjian Baru?", options: ["Ibrani", "Latin", "Yunani", "Aram"], correct: 2, hint: "Bahasa internasional di wilayah Romawi saat itu.", info: "Perjanjian Baru ditulis dalam bahasa Yunani Koine." },
        { q: "Siapa nama sahabat Daud yang merupakan anak Raja Saul?", options: ["Abner", "Yonatan", "Isboset", "Mephiboseth"], correct: 1, hint: "Persahabatan mereka sangat legendaris.", info: "1 Samuel 18:1 - Jiwa Yonatan berpadu dengan jiwa Daud." },
        { q: "Apa mukjizat Yesus yang melibatkan seorang anak kecil dengan bekalnya?", options: ["Membangkitkan orang mati", "Memberi makan 5000 orang", "Menyembuhkan orang buta", "Berjalan di air"], correct: 1, hint: "5 roti dan 2 ikan.", info: "Yohanes 6:9 - 'Di sini ada seorang anak laki-laki yang mempunyai lima roti jelai dan dua ikan.'" }

    ];

    // Karena data soal di prompt terpotong, pastikan Anda menggunakan list 50 soal lengkap milik Anda di sini.

    let currentIdx = 0;
    const questionEl = document.getElementById("question-text");
    const optionsEl = document.getElementById("options-container");
    const infoBox = document.getElementById("info-box");
    const nextBtn = document.getElementById("next-btn");
    const pinContainer = document.getElementById("pin-container");
    const pinInput = document.getElementById("pin-input");
    const progressEl = document.getElementById("progress-text");
    const hintTextEl = document.getElementById("hint-text");
    const qSelect = document.getElementById("q-select");

    function initSelector() {
        for (let i = 0; i < quizData.length; i++) {
            let opt = document.createElement("option");
            opt.value = i;
            opt.innerHTML = `Soal ${i + 1}`;
            qSelect.appendChild(opt);
        }
    }

    function jumpToQuestion(val) {
        currentIdx = parseInt(val);
        loadQuestion();
    }

    function loadQuestion() {
        nextBtn.style.display = "none";
        infoBox.style.display = "none";
        hintTextEl.style.display = "none";
        pinContainer.style.display = "none";
        optionsEl.innerHTML = "";
        qSelect.value = currentIdx;

        const data = quizData[currentIdx];
        progressEl.innerText = `SOAL ${currentIdx + 1} DARI ${quizData.length}`;
        questionEl.innerText = data.q;

        data.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsEl.appendChild(btn);
        });
    }

    function toggleHint() {
        const hint = quizData[currentIdx].hint;
        hintTextEl.innerText = "💡 Petunjuk: " + hint;
        hintTextEl.style.display = (hintTextEl.style.display === "none") ? "block" : "none";
    }

    function checkAnswer(selected, btn) {
        if (btn.classList.contains("correct") || btn.classList.contains("wrong")) return;
        const correctIdx = quizData[currentIdx].correct;

        if (selected === correctIdx) {
            btn.classList.add("correct");
            infoBox.innerHTML = "<b>Jawaban Benar! ✨</b><br><br>" + quizData[currentIdx].info;
            infoBox.style.display = "block";
            hintTextEl.style.display = "none";
            document.querySelectorAll(".option").forEach(b => b.classList.add("disabled"));

            // JIKA SOAL NOMOR 1 (INDEX 0), TAMPILKAN PIN
            if (currentIdx === 0) {
                pinContainer.style.display = "block";
            } else {
                nextBtn.style.display = "block";
            }
        } else {
            btn.classList.add("wrong");
        }
    }

    function verifyPin() {
        if (pinInput.value === MASTER_PIN) {
            pinContainer.style.display = "none";
            nextBtn.style.display = "block";
            pinInput.value = "";
        } else {
            alert("PIN Salah! Tanya panitia ya.");
            pinInput.value = "";
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("quiz-content").style.display = "none";
        document.getElementById("result").style.display = "block";
    }

    initSelector();
    loadQuestion();
</script>
